[cursor.style]
shape = "Underline"

[font]
size = 12.0

[font.normal]
family = "FiraCode Nerd Font"

[window]
dynamic_title = true

[selection]
save_to_clipboard = true

[mouse]
bindings = [
  { mouse = "Right", mods = "Shift", action = "Paste" },
]

[general]
import = ["~/.config/alacritty/aura-theme.toml"]
